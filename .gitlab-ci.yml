stages:
  - check
  - build
  - release

variables:
  BINARY_NAME: phctl
  GOLANGCI_LINT_VERSION: v2.9.0

fmt:
  stage: check
  image: golang:1.24
  script:
    - test -z "$(gofmt -l .)"

vet:
  stage: check
  image: golang:1.24
  script:
    - go vet ./...

lint:
  stage: check
  image: golangci/golangci-lint:${GOLANGCI_LINT_VERSION}
  script:
    - golangci-lint run ./...

test:
  stage: check
  image: golang:1.24
  script:
    - go test -race ./...

build:check:
  stage: check
  image: golang:1.24
  script:
    - go build ./...

.build_template: &build_template
  stage: build
  image: golang:1.24
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - export VERSION=${CI_COMMIT_TAG}
    - >
      go build
      -ldflags "-s -w -X main.version=${VERSION}"
      -o ${BINARY_NAME}-${GOOS}-${GOARCH}${EXT}
      .
  artifacts:
    paths:
      - ${BINARY_NAME}-${GOOS}-${GOARCH}${EXT}

build:linux-amd64:
  <<: *build_template
  variables:
    GOOS: linux
    GOARCH: amd64
    EXT: ""

build:linux-arm64:
  <<: *build_template
  variables:
    GOOS: linux
    GOARCH: arm64
    EXT: ""

build:darwin-amd64:
  <<: *build_template
  variables:
    GOOS: darwin
    GOARCH: amd64
    EXT: ""

build:darwin-arm64:
  <<: *build_template
  variables:
    GOOS: darwin
    GOARCH: arm64
    EXT: ""

build:windows-amd64:
  <<: *build_template
  variables:
    GOOS: windows
    GOARCH: amd64
    EXT: .exe

build:windows-arm64:
  <<: *build_template
  variables:
    GOOS: windows
    GOARCH: arm64
    EXT: .exe

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build:linux-amd64
    - build:linux-arm64
    - build:darwin-amd64
    - build:darwin-arm64
    - build:windows-amd64
    - build:windows-arm64
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "phctl ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: phctl-linux-amd64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-linux-amd64?job=build:linux-amd64"
        - name: phctl-linux-arm64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-linux-arm64?job=build:linux-arm64"
        - name: phctl-darwin-amd64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-darwin-amd64?job=build:darwin-amd64"
        - name: phctl-darwin-arm64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-darwin-arm64?job=build:darwin-arm64"
        - name: phctl-windows-amd64.exe
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-windows-amd64.exe?job=build:windows-amd64"
        - name: phctl-windows-arm64.exe
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-windows-arm64.exe?job=build:windows-arm64"
