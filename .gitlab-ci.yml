# Run tag pipelines (full: check+build+deploy+release) or branch pipelines (check only).
# GitLab deduplicates: if a tag and branch push share a SHA, only the tag pipeline runs.
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

stages:
  - check
  - build
  - deploy
  - release

variables:
  BINARY_NAME: phctl
  GOLANGCI_LINT_VERSION: v2.9.0

fmt:
  stage: check
  image: golang:1.24
  script:
    - test -z "$(gofmt -l .)"

vet:
  stage: check
  image: golang:1.24
  script:
    - go vet ./...

lint:
  stage: check
  image: golangci/golangci-lint:${GOLANGCI_LINT_VERSION}
  script:
    - golangci-lint run ./...

test:
  stage: check
  image: golang:1.24
  before_script:
    - go install gotest.tools/gotestsum@latest
  script:
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out $(go list ./... | grep -v /e2e)
    - go tool cover -func=coverage.out | tail -1
    - |
      TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
      THRESHOLD=40
      if awk "BEGIN{exit !($TOTAL < $THRESHOLD)}"; then
        echo "Coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
        exit 1
      fi
      echo "Coverage ${TOTAL}% meets threshold ${THRESHOLD}%"
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - coverage.out

e2e:
  stage: check
  image: golang:1.24
  rules:
    - if: $PIDGINHOST_API_TOKEN
  script:
    - go test -v -count=1 -p 1 -parallel 1 ./e2e/...

build:check:
  stage: check
  image: golang:1.24
  script:
    - go build ./...

.build_template: &build_template
  stage: build
  image: golang:1.24
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - export VERSION=${CI_COMMIT_TAG}
    - >
      go build
      -ldflags "-s -w -X main.version=${VERSION}"
      -o ${BINARY_NAME}-${GOOS}-${GOARCH}${EXT}
      .
  artifacts:
    paths:
      - ${BINARY_NAME}-${GOOS}-${GOARCH}${EXT}

build:linux-amd64:
  <<: *build_template
  variables:
    GOOS: linux
    GOARCH: amd64
    EXT: ""

build:linux-arm64:
  <<: *build_template
  variables:
    GOOS: linux
    GOARCH: arm64
    EXT: ""

build:darwin-amd64:
  <<: *build_template
  variables:
    GOOS: darwin
    GOARCH: amd64
    EXT: ""

build:darwin-arm64:
  <<: *build_template
  variables:
    GOOS: darwin
    GOARCH: arm64
    EXT: ""

build:windows-amd64:
  <<: *build_template
  variables:
    GOOS: windows
    GOARCH: amd64
    EXT: .exe

build:windows-arm64:
  <<: *build_template
  variables:
    GOOS: windows
    GOARCH: arm64
    EXT: .exe

# --- Deploy stage: sync to GitHub as PidginHost CI ---

deploy:github:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  before_script:
    - apk add --no-cache git git-filter-repo
    - git config --global user.name "PidginHost"
    - git config --global user.email "opensource@pidginhost.com"
  script:
    - git clone --mirror "${CI_REPOSITORY_URL}" repo.git
    - cd repo.git
    - |
      git filter-repo --force \
        --name-callback 'return b"PidginHost"' \
        --email-callback 'return b"opensource@pidginhost.com"'
    - git remote add github "https://${GITHUB_TOKEN}@github.com/pidginhost/phctl.git"
    - git push github --mirror --force

# --- Release stage: GitLab + GitHub releases ---

release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build:linux-amd64
    - build:linux-arm64
    - build:darwin-amd64
    - build:darwin-arm64
    - build:windows-amd64
    - build:windows-arm64
  script:
    - |
      # Extract changelog for this version (between ## vX.Y.Z and the next ## heading)
      NOTES=$(awk -v ver="${CI_COMMIT_TAG}" '/^## / { if (found) exit; if ($2 == ver) { found=1; next } } found { print }' CHANGELOG.md)
      if [ -z "$NOTES" ]; then
        NOTES="Release ${CI_COMMIT_TAG}"
      fi
      echo "$NOTES" > release_notes.md
      cat release_notes.md
  release:
    tag_name: $CI_COMMIT_TAG
    name: "phctl ${CI_COMMIT_TAG}"
    description: ./release_notes.md
    assets:
      links:
        - name: phctl-linux-amd64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-linux-amd64?job=build:linux-amd64"
        - name: phctl-linux-arm64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-linux-arm64?job=build:linux-arm64"
        - name: phctl-darwin-amd64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-darwin-amd64?job=build:darwin-amd64"
        - name: phctl-darwin-arm64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-darwin-arm64?job=build:darwin-arm64"
        - name: phctl-windows-amd64.exe
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-windows-amd64.exe?job=build:windows-amd64"
        - name: phctl-windows-arm64.exe
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/phctl-windows-arm64.exe?job=build:windows-arm64"

release:github:
  stage: release
  image: golang:1.24
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: true
  needs:
    - build:linux-amd64
    - build:linux-arm64
    - build:darwin-amd64
    - build:darwin-arm64
    - build:windows-amd64
    - build:windows-arm64
    - deploy:github
  before_script:
    - apt-get update -qq && apt-get install -y -qq jq > /dev/null
  script:
    - |
      VERSION="${CI_COMMIT_TAG}"

      # Extract changelog for this version
      NOTES=$(awk -v ver="${VERSION}" '/^## / { if (found) exit; if ($2 == ver) { found=1; next } } found { print }' CHANGELOG.md)
      if [ -z "$NOTES" ]; then
        NOTES="Release ${VERSION}"
      fi

      # Build JSON body with jq to handle escaping
      BODY=$(jq -n --arg tag "$VERSION" --arg name "phctl ${VERSION}" --arg body "$NOTES" \
        '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')

      # Check if release already exists
      EXISTING=$(curl -s -o /dev/null -w "%{http_code}" \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        "https://api.github.com/repos/pidginhost/phctl/releases/tags/${VERSION}")

      if [ "$EXISTING" = "200" ]; then
        echo "Release ${VERSION} already exists, skipping creation"
        RELEASE_ID=$(curl -s \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          "https://api.github.com/repos/pidginhost/phctl/releases/tags/${VERSION}" | jq -r '.id')
      else
        RELEASE_ID=$(curl -sf -X POST \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/pidginhost/phctl/releases" \
          -d "$BODY" | jq -r '.id')
        echo "Created GitHub release ${VERSION} (ID: ${RELEASE_ID})"
      fi

      # Upload binaries
      for file in phctl-linux-amd64 phctl-linux-arm64 phctl-darwin-amd64 phctl-darwin-arm64 phctl-windows-amd64.exe phctl-windows-arm64.exe; do
        if [ -f "$file" ]; then
          echo "Uploading $file..."
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            "https://uploads.github.com/repos/pidginhost/phctl/releases/${RELEASE_ID}/assets?name=${file}" \
            --data-binary @"$file"
          echo " uploaded."
        fi
      done
