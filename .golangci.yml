version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Printf
        - (io.Closer).Close
        - (*text/tabwriter.Writer).Flush
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
        - os.Setenv
